<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drone Dashboard — Login</title>
<style>
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0b0d12; color: #e6e8ee;
    display: grid; place-items: center;
  }
  form {
    background: #151823; padding: 28px 28px 22px;
    border: 1px solid #232838; border-radius: 12px;
    width: min(360px, 92vw);
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  h1 { margin: 0 0 6px; font-size: 18px; letter-spacing: .3px; }
  p.sub { margin: 0 0 18px; color: #8a93a6; font-size: 13px; }
  label { display: block; font-size: 12px; color: #aab2c5; margin: 12px 0 6px; }
  input {
    width: 100%; box-sizing: border-box;
    background: #0e1118; color: #e6e8ee;
    border: 1px solid #2a3043; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; outline: none;
  }
  input:focus { border-color: #4c7cff; }
  button {
    margin-top: 18px; width: 100%;
    background: #4c7cff; color: white; border: 0;
    padding: 11px; border-radius: 8px; font-weight: 600;
    cursor: pointer; font-size: 14px;
  }
  button:hover { background: #3b6cf0; }
  .err {
    margin-top: 14px; padding: 9px 11px;
    background: #3a1822; border: 1px solid #6b2230;
    color: #ffb3bf; border-radius: 8px; font-size: 13px;
  }
</style>
</head>
<body>
  <form method="POST" action="/login" autocomplete="off">
    <h1>Drone Dashboard</h1>
    <p class="sub">Sign in to continue.</p>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" required autofocus>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Log in</button>
    __ERROR__
  </form>
</body>
</html>
