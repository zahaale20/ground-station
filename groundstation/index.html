<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drone Dashboard</title>
  <meta http-equiv="refresh" content="0; url=/ui/index.html">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #0b0f14;
    color: #e6edf3;
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  .card {
    width: min(640px, 92vw);
    background: #141b24;
    border: 1px solid #1f2a36;
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  h1 { margin: 0 0 8px; font-size: 20px; }
  p { margin: 0 0 12px; color: #8b97a6; }
  code { background: #0d141d; padding: 2px 6px; border-radius: 4px; }
  a { color: #58a6ff; }
</style>
<script>
  const target = new URL('/ui/index.html', location.origin);
  target.search = location.search;
  location.replace(target.toString());
</script>
</head>
<body>
  <div class="card">
    <h1>Drone Dashboard</h1>
    <p>Redirecting to the ground-station UI. If that does not happen, open <code>/ui/index.html</code>.</p>
    <p>If you are running this locally on your MacBook, keep the page on <code>localhost</code> so geolocation works.</p>
    <p><a href="/ui/index.html">Continue</a></p>
  </div>
</body>
</html>
